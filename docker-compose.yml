services:
  postgres:
    image: postgres:16-alpine
    container_name: property-billing-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-property_billing}
      POSTGRES_USER: ${POSTGRES_USER:-property_billing}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-property_billing_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
