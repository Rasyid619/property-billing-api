openapi: 3.0.3
info:
  title: Property Billing API
  version: 0.1.0
  description: API for apartment and housing monthly fee tracking.

servers:
  - url: http://localhost:8080/api/v1
    description: Local development server.

tags:
  - name: Auth
    description: Operations for admin and staff authentication.
  - name: Cash Balances
    description: Operations for monthly closing balances.
  - name: Health
    description: Operations for checking API availability.
  - name: Invoices
    description: Operations for monthly invoice generation and retrieval.
  - name: Payments
    description: Operations for invoice payment recording.
  - name: Properties
    description: Operations for property management.
  - name: Property Expenses
    description: Operations for property expense tracking.
  - name: Reports
    description: Operations for cash-flow reporting.
  - name: Tenant Assignments
    description: Operations for unit tenant assignment history.
  - name: Tenants
    description: Operations for tenant data management.
  - name: Units
    description: Operations for unit management.

paths:
  /auth/login:
    post:
      tags:
        - Auth
      summary: Login an admin or staff user.
      description: Returns a JWT access token for valid admin or staff credentials. Tenant login is not supported in MVP.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/register:
    post:
      tags:
        - Auth
      summary: Register an admin or staff user.
      description: Creates a user account for administrators or property staff only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registration succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"

  /cash-balances/close-month:
    post:
      tags:
        - Cash Balances
      summary: Close a monthly cash balance.
      description: Calculates and stores the opening balance, income, expenses, and closing balance for a property month.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CashBalanceCloseMonthRequest"
      responses:
        "201":
          description: Monthly cash balance was closed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CashBalanceResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /expenses:
    get:
      tags:
        - Property Expenses
      summary: List property expenses.
      description: Returns property expenses filtered by property and optional month.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PropertyIdQuery"
        - $ref: "#/components/parameters/MonthQuery"
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Expenses were successfully retrieved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseIndexResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags:
        - Property Expenses
      summary: Create a property expense.
      description: Records money spent for a property.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpenseCreateRequest"
      responses:
        "201":
          description: Expense was created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseShowResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /expenses/{expenseId}:
    delete:
      tags:
        - Property Expenses
      summary: Delete a property expense.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ExpenseId"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags:
        - Property Expenses
      summary: Update a property expense.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ExpenseId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpenseUpdateRequest"
      responses:
        "200":
          description: Expense was updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseShowResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /health:
    get:
      tags:
        - Health
      summary: Check API health.
      description: Returns HTTP 200 when the API is running.
      responses:
        "200":
          description: API is running. The response body is empty.

  /invoices:
    get:
      tags:
        - Invoices
      summary: List invoices.
      description: Returns invoices filtered by property, unit, tenant, month, or status.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PropertyIdOptionalQuery"
        - $ref: "#/components/parameters/UnitIdQuery"
        - $ref: "#/components/parameters/TenantIdQuery"
        - $ref: "#/components/parameters/MonthQuery"
        - $ref: "#/components/parameters/InvoiceStatusQuery"
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Invoices were successfully retrieved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceIndexResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /invoices/generate-monthly:
    post:
      tags:
        - Invoices
      summary: Generate monthly invoices.
      description: Generates one invoice per active unit with an active tenant for the requested property and billing month.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceGenerateMonthlyRequest"
      responses:
        "201":
          description: Monthly invoice generation completed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedInvoicesResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /invoices/{invoiceId}:
    get:
      tags:
        - Invoices
      summary: Get invoice detail.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/InvoiceId"
      responses:
        "200":
          description: Invoice detail was successfully retrieved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceShowResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /invoices/{invoiceId}/payments:
    get:
      tags:
        - Payments
      summary: List invoice payments.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/InvoiceId"
      responses:
        "200":
          description: Payments were successfully retrieved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentIndexResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags:
        - Payments
      summary: Record an invoice payment.
      description: Records payment and recalculates the invoice status.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/InvoiceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentCreateRequest"
      responses:
        "201":
          description: Payment was recorded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentShowResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /properties:
    get:
      tags:
        - Properties
      summary: List properties.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Search"
      responses:
        "200":
          description: Properties were successfully retrieved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertyIndexResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags:
        - Properties
      summary: Create a property.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PropertyCreateRequest"
      responses:
        "201":
          description: Property was created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertyShowResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /properties/{propertyId}:
    delete:
      tags:
        - Properties
      summary: Deactivate a property.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PropertyId"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    get:
      tags:
        - Properties
      summary: Get property detail.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PropertyId"
      responses:
        "200":
          description: Property detail was successfully retrieved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertyShowResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags:
        - Properties
      summary: Update a property.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PropertyId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PropertyUpdateRequest"
      responses:
        "200":
          description: Property was updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertyShowResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /properties/{propertyId}/units:
    get:
      tags:
        - Units
      summary: List units by property.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PropertyId"
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Units were successfully retrieved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnitIndexResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags:
        - Units
      summary: Create a unit.
      description: Creates a unit inside a property. Unit and tenant are separate resources.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PropertyId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UnitCreateRequest"
      responses:
        "201":
          description: Unit was created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnitShowResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /reports/cash-flow:
    get:
      tags:
        - Reports
      summary: Get a cash-flow report.
      description: Returns total income, total expenses, and net saving for a property month.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PropertyIdQuery"
        - $ref: "#/components/parameters/MonthQueryRequired"
      responses:
        "200":
          description: Cash-flow report was successfully retrieved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CashFlowReportResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /tenants:
    get:
      tags:
        - Tenants
      summary: List tenants.
      description: Returns tenant data records. Tenants do not have login accounts in MVP.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Search"
      responses:
        "200":
          description: Tenants were successfully retrieved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantIndexResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags:
        - Tenants
      summary: Create a tenant.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantCreateRequest"
      responses:
        "201":
          description: Tenant was created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantShowResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /tenants/{tenantId}:
    get:
      tags:
        - Tenants
      summary: Get tenant detail.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantId"
      responses:
        "200":
          description: Tenant detail was successfully retrieved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantShowResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags:
        - Tenants
      summary: Update a tenant.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantUpdateRequest"
      responses:
        "200":
          description: Tenant was updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantShowResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /unit-tenant-assignments/{assignmentId}/move-out:
    patch:
      tags:
        - Tenant Assignments
      summary: Move out a tenant from a unit.
      description: Closes an active tenant assignment and preserves assignment history.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AssignmentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantAssignmentMoveOutRequest"
      responses:
        "200":
          description: Tenant assignment was closed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantAssignmentShowResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /units/{unitId}:
    delete:
      tags:
        - Units
      summary: Deactivate a unit.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UnitId"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    get:
      tags:
        - Units
      summary: Get unit detail.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UnitId"
      responses:
        "200":
          description: Unit detail was successfully retrieved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnitShowResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags:
        - Units
      summary: Update a unit.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UnitId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UnitUpdateRequest"
      responses:
        "200":
          description: Unit was updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnitShowResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /units/{unitId}/active-tenant:
    get:
      tags:
        - Tenant Assignments
      summary: Get the active tenant for a unit.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UnitId"
      responses:
        "200":
          description: Active tenant assignment was successfully retrieved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantAssignmentShowResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /units/{unitId}/tenant-assignments:
    get:
      tags:
        - Tenant Assignments
      summary: List tenant assignment history for a unit.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UnitId"
      responses:
        "200":
          description: Assignment history was successfully retrieved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantAssignmentIndexResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags:
        - Tenant Assignments
      summary: Assign a tenant to a unit.
      description: Creates an active tenant assignment. A unit can only have one active tenant assignment.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UnitId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantAssignmentCreateRequest"
      responses:
        "201":
          description: Tenant was assigned to the unit.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantAssignmentShowResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

components:
  parameters:
    AssignmentId:
      name: assignmentId
      in: path
      required: true
      description: UUID of the tenant assignment.
      schema:
        type: string
        format: uuid
    ExpenseId:
      name: expenseId
      in: path
      required: true
      description: UUID of the property expense.
      schema:
        type: string
        format: uuid
    InvoiceId:
      name: invoiceId
      in: path
      required: true
      description: UUID of the invoice.
      schema:
        type: string
        format: uuid
    InvoiceStatusQuery:
      name: status
      in: query
      required: false
      description: Invoice status filter.
      schema:
        $ref: "#/components/schemas/InvoiceStatus"
    MonthQuery:
      name: month
      in: query
      required: false
      description: Month in YYYY-MM format.
      schema:
        type: string
        pattern: "^\\d{4}-\\d{2}$"
        example: "2026-05"
    MonthQueryRequired:
      name: month
      in: query
      required: true
      description: Month in YYYY-MM format.
      schema:
        type: string
        pattern: "^\\d{4}-\\d{2}$"
        example: "2026-05"
    Limit:
      name: limit
      in: query
      required: false
      description: Maximum number of items to return.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 100
    PropertyId:
      name: propertyId
      in: path
      required: true
      description: UUID of the property.
      schema:
        type: string
        format: uuid
    PropertyIdOptionalQuery:
      name: propertyId
      in: query
      required: false
      description: UUID of the property.
      schema:
        type: string
        format: uuid
    PropertyIdQuery:
      name: propertyId
      in: query
      required: true
      description: UUID of the property.
      schema:
        type: string
        format: uuid
    Search:
      name: search
      in: query
      required: false
      description: Search keyword.
      schema:
        type: string
        maxLength: 100
    Offset:
      name: offset
      in: query
      required: false
      description: Number of items to skip before returning results.
      schema:
        type: integer
        minimum: 0
        default: 0
    TenantId:
      name: tenantId
      in: path
      required: true
      description: UUID of the tenant.
      schema:
        type: string
        format: uuid
    TenantIdQuery:
      name: tenantId
      in: query
      required: false
      description: UUID of the tenant.
      schema:
        type: string
        format: uuid
    UnitId:
      name: unitId
      in: path
      required: true
      description: UUID of the unit.
      schema:
        type: string
        format: uuid
    UnitIdQuery:
      name: unitId
      in: query
      required: false
      description: UUID of the unit.
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: The request is invalid.
    Conflict:
      description: The request could not be completed due to a conflict with the current state of the resource.
    Forbidden:
      description: Access is forbidden.
    InternalServerError:
      description: The server encountered an unexpected condition that prevented it from fulfilling the request.
    NoContent:
      description: The request was successful and no content was returned.
    NotFound:
      description: The requested resource was not found.
    Unauthorized:
      description: Authentication is required and has failed.

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:



    TenantAssignmentCreateRequest:
      type: object
      properties:
        tenantId:
          type: string
          format: uuid
        startDate:
          type: string
          format: date
          example: "2026-05-01"
      required:
        - tenantId
        - startDate

    AuthTokenResponse:
      type: object
      properties:
        accessToken:
          type: string
          example: jwt-token
        tokenType:
          type: string
          example: Bearer
      required:
        - accessToken
        - tokenType


    CashBalanceResponse:
      type: object
      properties:
        propertyId:
          type: string
          format: uuid
        month:
          type: string
