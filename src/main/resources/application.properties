spring.application.name=property-billing-api
server.port=${SERVER_PORT:8080}
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.flyway.placeholders.initial_admin_id=${INITIAL_ADMIN_ID}
spring.flyway.placeholders.initial_admin_name=${INITIAL_ADMIN_NAME}
spring.flyway.placeholders.initial_admin_email=${INITIAL_ADMIN_EMAIL}
spring.flyway.placeholders.initial_admin_password_hash=${INITIAL_ADMIN_PASSWORD_HASH}
spring.flyway.placeholders.initial_admin_role=${INITIAL_ADMIN_ROLE}
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-ttl-seconds=${JWT_ACCESS_TOKEN_TTL_SECONDS:900}
app.jwt.refresh-token-ttl-seconds=${JWT_REFRESH_TOKEN_TTL_SECONDS:604800}
app.invoice.automation.enabled=${INVOICE_AUTOMATION_ENABLED:false}
app.invoice.automation.cron=${INVOICE_AUTOMATION_CRON:0 0 0 25 * *}
app.invoice.automation.zone=${INVOICE_AUTOMATION_ZONE:Asia/Jakarta}
management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,prometheus}
management.endpoint.health.probes.enabled=${MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED:true}
management.prometheus.metrics.export.enabled=${MANAGEMENT_PROMETHEUS_METRICS_EXPORT_ENABLED:true}
